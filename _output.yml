bookdown::gitbook:
  number_sections: yes
  split_by: chapter
  split_bib: yes
  css: style.css
  highlight: tango
  includes:
    in_header: in_header.html
  config:
    toc:
      before: |
        <li><a href="./">Guide to Wise Investing</a></li>
      after: |
        <li><a href="https://github.com/rstudio/bookdown" target="blank">Published with bookdown</a></li>
    search: yes
    fontsettings:
      theme: white
      family: sans
    download: null
    sharing:
      facebook: yes
      twitter: yes