bookdown::gitbook:
  number_sections: yes
  split_by: chapter
  split_bib: yes
  css: style.css
  highlight: tango
  includes:
    in_header: google_analytics.html
  config:
    toc:
      before: |
        <li><a href="./">Guide for Wise Investing</a></li>
      after: |
        <li><a href="https://github.com/rstudio/bookdown" target="blank">Published with bookdown</a></li>
    search: yes
    fontsettings:
      theme: sepia
      family: sans
    download: null
    info: yes
    sharing:
      facebook: yes
      twitter: yes